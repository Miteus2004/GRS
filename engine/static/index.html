<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>IBN Engine Dashboard</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:20px} pre{background:#f4f4f4;padding:10px}</style>
  <script>
  async function fetchOspf(){
    const r=await fetch('/api/ospf_neighbors');
    const j=await r.json(); document.getElementById('ospf').textContent=JSON.stringify(j,null,2);
  }
  async function fetchBgp(){
    const r=await fetch('/api/bgp_summary');
    const j=await r.json(); document.getElementById('bgp').textContent=JSON.stringify(j,null,2);
  }
  </script>
</head>
<body>
  <h1>IBN Engine — Quick Dashboard</h1>
  <p>Use the buttons to run live checks against router containers.</p>
  <button onclick="fetchOspf()">Check OSPF Neighbors</button>
  <pre id="ospf">(no data)</pre>
  <button onclick="fetchBgp()">Check BGP Summary</button>
  <pre id="bgp">(no data)</pre>
</body>
</html>
